celery:
  broker_url: memory://
  result_backend: cache+memory://
  task_always_eager: true

database:
  url: ${oc.env:LOOM_TEST_DATABASE_URL}
  echo: false
  pool_pre_ping: true

jobs:
  _CreateRecordViaUseCaseJob:
    queue: tests.integration.celery_bootstrap.test_auto_create_app_integration
    retries: 0
    countdown: 0
    priority: 0
  _GetRecordViaLoadByIdJob:
    queue: tests.integration.celery_bootstrap.test_auto_create_app_integration
    retries: 0
    countdown: 0
    priority: 0
  _RenameRecordViaLoadByIdJob:
    queue: tests.integration.celery_bootstrap.test_auto_create_app_integration
    retries: 0
    countdown: 0
    priority: 0
  _LoadRecordByNameJob:
    queue: tests.integration.celery_bootstrap.test_auto_create_app_integration
    retries: 0
    countdown: 0
    priority: 0
  _ExistsRecordByNameJob:
    queue: tests.integration.celery_bootstrap.test_auto_create_app_integration
    retries: 0
    countdown: 0
    priority: 0
  _CreateRecordInlineJob:
    queue: tests.integration.celery_bootstrap.test_auto_create_app_integration
    retries: 0
    countdown: 0
    priority: 0
  _AlwaysFailJob:
    queue: tests.integration.celery_bootstrap.test_auto_create_app_integration
    retries: 0
    countdown: 0
    priority: 0
  _DispatchChildJobOrchestratorJob:
    queue: tests.integration.celery_bootstrap.test_auto_create_app_integration
    retries: 0
    countdown: 0
    priority: 0
