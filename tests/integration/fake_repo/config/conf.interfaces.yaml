app:
  name: fake_repo
  code_path: ../../..
  discovery:
    mode: interfaces
    interfaces:
      modules:
        - tests.integration.fake_repo.product.interface
      warn_recommended: true
  rest:
    backend: fastapi
    title: Fake Repo Integration API
    version: 1.0.0
    docs_url: /docs
    redoc_url: /redoc

database:
  url: ${oc.env:LOOM_TEST_DATABASE_URL}
  echo: false
  pool_pre_ping: true

metrics:
  enabled: true
  path: /metrics
