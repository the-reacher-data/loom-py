sonar.projectName=loom-py
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Exclude non-source directories from all analysis
sonar.exclusions=docs/**,**/.github/**,tests/integration/fake_repo/src/**

# Exclude test and config directories from duplication detection
sonar.cpd.exclusions=tests/**,**/.github/**,docs/**

# Exclude test and config directories from coverage obligations
sonar.coverage.exclusions=tests/**,**/.github/**,docs/**

# Suppress python:S100 (function naming convention ^[a-z_][a-z0-9_]*$) for
# all public DSL factory functions. These are intentionally PascalCase so
# user code reads like type-constructor / type-annotation syntax:
#
#   Use-case DSL  → Input(), Load(), LoadById(), Exists(), F(...)
#   Model DSL     → ColumnField(), RelationField(), ProjectionField(),
#                   String(), DateTime(), Numeric()
#
# Renaming any of them would be a breaking public API change.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11,e12,e13,e14,e15,e16

# Use-case DSL markers: Input, Load, LoadById, Exists — S100 (method) + S1542 (function)
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=src/loom/core/use_case/markers.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1542
sonar.issue.ignore.multicriteria.e2.resourceKey=src/loom/core/use_case/markers.py

# Use-case field-reference shorthand: F(...)
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S100
sonar.issue.ignore.multicriteria.e3.resourceKey=src/loom/core/use_case/field_ref.py
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S1542
sonar.issue.ignore.multicriteria.e4.resourceKey=src/loom/core/use_case/field_ref.py

# Model column factory: ColumnField(...)
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S100
sonar.issue.ignore.multicriteria.e5.resourceKey=src/loom/core/model/field.py
sonar.issue.ignore.multicriteria.e10.ruleKey=python:S1542
sonar.issue.ignore.multicriteria.e10.resourceKey=src/loom/core/model/field.py

# Model relation factory: RelationField(...)
sonar.issue.ignore.multicriteria.e6.ruleKey=python:S100
sonar.issue.ignore.multicriteria.e6.resourceKey=src/loom/core/model/relation.py
sonar.issue.ignore.multicriteria.e11.ruleKey=python:S1542
sonar.issue.ignore.multicriteria.e11.resourceKey=src/loom/core/model/relation.py

# Model column-type constructors: String, DateTime, Numeric
sonar.issue.ignore.multicriteria.e12.ruleKey=python:S100
sonar.issue.ignore.multicriteria.e12.resourceKey=src/loom/core/model/types.py
sonar.issue.ignore.multicriteria.e13.ruleKey=python:S1542
sonar.issue.ignore.multicriteria.e13.resourceKey=src/loom/core/model/types.py

# Model projection factory: ProjectionField(...)
sonar.issue.ignore.multicriteria.e14.ruleKey=python:S100
sonar.issue.ignore.multicriteria.e14.resourceKey=src/loom/core/model/projection.py
sonar.issue.ignore.multicriteria.e15.ruleKey=python:S1542
sonar.issue.ignore.multicriteria.e15.resourceKey=src/loom/core/model/projection.py

# python:S1172 — "Remove the unused function parameter".
# _validate_marker_refs(input_binding=...) uses input_binding in `is None` guards
# (lines 308, 321). Sonar's dataflow analysis fails to track usage via None-checks.
sonar.issue.ignore.multicriteria.e16.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.e16.resourceKey=src/loom/core/engine/compiler.py

# python:S1440 — "Replace 'is' with '=='" flagged on `assert x is True/False`.
# In Python tests, `is True` / `is False` are intentional identity checks
# (stricter than == True). This is the recommended pattern in pytest and aligns
# with PEP 8 which explicitly warns against `== True`. False positive for tests.
sonar.issue.ignore.multicriteria.e7.ruleKey=python:S1440
sonar.issue.ignore.multicriteria.e7.resourceKey=tests/**/*.py

# python:S4830 — "Use asynchronous features or remove the async keyword".
# pytest-asyncio (asyncio_mode=auto) requires `async def` for all tests that
# run inside an event loop, even when the test body has no explicit `await`.
# Removing `async` would break tests that use async fixtures or future-proof
# tests where await is added incrementally. False positive for test suites.
sonar.issue.ignore.multicriteria.e8.ruleKey=python:S4830
sonar.issue.ignore.multicriteria.e8.resourceKey=tests/**/*.py

# python:S1244 — "Do not perform equality checks with floating point values".
# Integration tests compare domain/API responses where values originate from
# controlled fixtures (not arithmetic). pytest.approx() is used in unit tests.
# Integration assertions use exact literal values that match the fixture data.
sonar.issue.ignore.multicriteria.e9.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.e9.resourceKey=tests/integration/**/*.py

sonar.sourceEncoding=UTF-8
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit.xml
