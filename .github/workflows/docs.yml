name: docs

on:
  pull_request:
    branches: ["master"]
    paths:
      - "docs/**"
      - "src/**/*.py"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "src/**/*.py"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# PRs use a per-PR group so they never block or wait on the Pages deploy lock.
# Push/dispatch use the shared 'pages' group to serialise concurrent deploys.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('docs-pr-{0}', github.event.pull_request.number) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    # contents: read is scoped here — build does not need pages or id-token.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Build docs (strict)
        shell: bash
        run: |
          set -euo pipefail
          uv run \
            --extra rest \
            --extra sqlalchemy \
            --extra cache \
            --extra config \
            --extra prometheus \
            --with 'sphinx>=8.0' \
            --with 'furo>=2024.8.6' \
            --with 'myst-parser>=3.0' \
            --with 'sphinx-copybutton>=0.5' \
            --with 'sphinx-design>=0.6' \
            sphinx-build -W -b html docs docs/_build/html

      # upload-pages-artifact creates the zip format required by deploy-pages.
      # Used instead of upload-artifact so the deploy job can consume it directly.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on push to master, not on PRs.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    # pages: write + id-token: write are required for OIDC-based Pages deployment.
    # Scoped here — deploy does not need contents read.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
