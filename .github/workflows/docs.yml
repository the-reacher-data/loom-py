name: docs

on:
  pull_request:
    branches: ["master"]
    paths:
      - "docs/**"
      - "src/**/*.py"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "src/**/*.py"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# pages: write + id-token: write are required for OIDC-based Pages deployment.
# contents: read covers checkout. No secret tokens needed for Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deploys; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Build docs (strict)
        shell: bash
        run: |
          set -euo pipefail
          uv run \
            --extra fastapi \
            --extra sqlalchemy \
            --extra cache \
            --extra config \
            --extra prometheus \
            --with 'sphinx>=8.0' \
            --with 'furo>=2024.8.6' \
            --with 'myst-parser>=3.0' \
            sphinx-build -W -b html docs docs/_build/html

      # upload-pages-artifact creates the zip format required by deploy-pages.
      # Used instead of upload-artifact so the deploy job can consume it directly.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on push to master, not on PRs.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
