name: docs

on:
  pull_request:
    branches: ["master"]
    paths:
      - "docs/**"
      - "src/**/*.py"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "src/**/*.py"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - name: Build docs (strict)
        shell: bash
        run: |
          set -euo pipefail
          uv run \
            --with sphinx>=8.0 \
            --with furo>=2024.8.6 \
            --with myst-parser>=3.0 \
            sphinx-build -W -b html docs docs/_build/html

      - name: Upload docs artifact
        if: ${{ always() && hashFiles('docs/_build/html/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
