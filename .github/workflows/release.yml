name: release

on:
  pull_request:
    types: [closed]
    branches: ["master"]
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch used to compute semantic release version"
        required: true
        default: "master"

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && !startsWith(github.event.pull_request.head.ref, 'docs/')) }}
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      RELEASE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.source_branch || github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Configure uv environment path
        shell: bash
        run: |
          set -euo pipefail
          echo "UV_PROJECT_ENVIRONMENT=$RUNNER_TEMP/uv-release" >> "$GITHUB_ENV"

      - name: Compute release version from merged branch
        id: version
        uses: the-reacher-data/loom-actions/actions/release/versioning-branch-semantic@e731576f4f9cf4ec2b36fddfc895d328c856d29f # v1
        with:
          branch: ${{ env.RELEASE_BRANCH }}
          prerelease: "false"

      - name: Generate release changelog
        id: changelog
        if: ${{ steps.version.outputs.deploy == 'true' && github.event_name != 'workflow_dispatch' }}
        uses: the-reacher-data/loom-actions/actions/release/changelog-conventional-commit@e731576f4f9cf4ec2b36fddfc895d328c856d29f # v1
        with:
          mode: "release"
          branch: ${{ env.RELEASE_BRANCH }}
          version: ${{ steps.version.outputs.version }}
          pr-number: ${{ github.event.pull_request.number }}
          output: CHANGELOG_RELEASE.md

      - name: Generate fallback changelog for manual release
        if: ${{ steps.version.outputs.deploy == 'true' && github.event_name == 'workflow_dispatch' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_BRANCH: ${{ env.RELEASE_BRANCH }}
        shell: bash
        run: |
          set -euo pipefail
          cat > CHANGELOG_RELEASE.md <<EOF
          # Release v${VERSION}

          Manual release triggered from branch: ${SOURCE_BRANCH}
          EOF

      - name: Sync project version
        if: ${{ steps.version.outputs.deploy == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          sed -i "0,/^version = \".*\"/s//version = \"${VERSION}\"/" pyproject.toml
          sed -i "/^\[tool.commitizen\]/,/^\[/ s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml

      - name: Open version bump PR
        if: ${{ steps.version.outputs.deploy == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="docs/release-v${VERSION}"
          git checkout -b "${BRANCH}"

          if [ -f CHANGELOG_RELEASE.md ]; then
            cat CHANGELOG_RELEASE.md CHANGELOG.md > CHANGELOG_MERGED.md
            mv CHANGELOG_MERGED.md CHANGELOG.md
          fi

          git add pyproject.toml CHANGELOG.md
          git diff --staged --quiet && exit 0
          git commit -m "chore(release): bump version to ${VERSION}"
          git push origin "${BRANCH}"

          gh pr create \
            --title "chore(release): bump version to ${VERSION}" \
            --body "Automated version bump and changelog update after release v${VERSION}." \
            --base master \
            --head "${BRANCH}"

          gh pr merge "${BRANCH}" --squash --auto --delete-branch

      - name: Build package
        if: ${{ steps.version.outputs.deploy == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          uv run --with build python -m build

      - name: Publish package to PyPI (token mode)
        if: ${{ steps.version.outputs.deploy == 'true' && env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}

      - name: Publish package to PyPI (trusted publisher)
        if: ${{ steps.version.outputs.deploy == 'true' && env.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

      - name: Create and push tags
        if: ${{ steps.version.outputs.deploy == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists; skipping"
            exit 0
          fi

          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          git push origin ":refs/tags/v${MAJOR}" || true
          git tag -fa "v${MAJOR}" -m "Release v${VERSION}"
          git push origin "v${MAJOR}" --force

      - name: Create GitHub release
        if: ${{ steps.version.outputs.deploy == 'true' }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: CHANGELOG_RELEASE.md
